<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pink:#d4789c;--pink-light:#fef7f9;--pink-bg:#fff5f8;--text:#2d2d2d;--text-light:#666;--card-bg:#fff;--border:#f0e0e6;--shadow:0 2px 8px rgba(212,120,156,.12)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans",sans-serif;background:var(--pink-light);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
/* Header */
.header{background:linear-gradient(135deg,#d4789c,#c0628a);color:#fff;padding:18px 16px 14px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.header h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.header .sub{font-size:12px;opacity:.85;margin-top:4px}
/* Tab bar */
.tabs{display:flex;position:sticky;top:56px;z-index:99;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:10px 14px;font-size:13px;font-weight:600;color:var(--text-light);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s;user-select:none}
.tab.active{color:var(--pink);border-bottom-color:var(--pink)}
.tab:active{background:var(--pink-bg)}
/* Content */
.content{padding:12px 12px 24px;max-width:600px;margin:0 auto}
.day-view{display:none}
.day-view.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* Day header */
.day-header{background:var(--card-bg);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.day-header .date{font-size:16px;font-weight:700;color:var(--pink)}
.day-header .hotel{font-size:13px;color:var(--text-light);margin-top:4px}
.day-header .hotel::before{content:"🏨 "}
.day-header .warn{font-size:12px;color:#b85c00;background:#fff8ef;border-left:3px solid #f0a030;padding:6px 10px;margin-top:8px;border-radius:0 8px 8px 0;line-height:1.5}
/* Timeline */
.timeline{position:relative;padding-left:20px}
.timeline::before{content:"";position:absolute;left:8px;top:12px;bottom:12px;width:2px;background:linear-gradient(to bottom,var(--pink),#e8c0d0)}
.item{position:relative;margin-bottom:8px}
.item::before{content:"";position:absolute;left:-16px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--pink);border:2px solid #fff;box-shadow:0 0 0 2px var(--pink);z-index:1}
.item.bus::before{background:#888;box-shadow:0 0 0 2px #888}
.item.rest::before{background:#aaa;box-shadow:0 0 0 2px #aaa}
.card{background:var(--card-bg);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);transition:transform .15s}
.card:active{transform:scale(.98)}
.card .time{font-size:11px;color:var(--pink);font-weight:700;letter-spacing:.3px}
.card .activity{font-size:14px;font-weight:600;margin:4px 0 2px;line-height:1.4}
.card .activity a{color:var(--text);text-decoration:none;border-bottom:1px dashed var(--pink)}
.card .notes{font-size:11.5px;color:var(--text-light);line-height:1.5;margin-top:4px}
.card .notes .warn-text{color:#b85c00}
.card .map-link{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--pink);margin-top:6px;text-decoration:none;padding:3px 8px;background:var(--pink-bg);border-radius:20px;font-weight:500}
.card .map-link:active{background:#fce0ec}
.card.compact{padding:8px 14px}
.card.compact .activity{font-size:12px;font-weight:500;color:var(--text-light)}
/* Budget section */
.budget{background:var(--card-bg);border-radius:14px;padding:14px 16px;margin-top:16px;box-shadow:var(--shadow)}
.budget h3{font-size:13px;font-weight:700;color:var(--pink);margin-bottom:8px}
.budget table{width:100%;font-size:12px;border-collapse:collapse}
.budget td{padding:3px 0;border-bottom:1px solid var(--border)}
.budget td:last-child{text-align:right;font-weight:600}
.budget tr:last-child td{border-bottom:none;color:var(--pink);font-weight:700}
/* Footer */
.footer{text-align:center;padding:20px;font-size:11px;color:#bbb}
</style>
</head>

      {t:"06:40",a:"✈ 國際線 Check-in＋託運行李",n:"VietJet 櫃台（起飛前 ~2h20m）",m:"新千歳空港 国際線"},
      {t:"07:15~07:50",a:"🍳 國內線早餐",n:"新千歳エアポートレストラン by ROYAL HOST（3F 07:20~）",m:"ロイヤルホスト 新千歳空港店"},
      {t:"08:00",a:"🛃 保安檢查 → 出國審查",n:""},
      {t:"~08:20",a:"🛍 管制區內免稅店",n:"最後採購機會"},
      {t:"09:00",a:"✈ 航班起飛",n:"VZ571｜CTS 09:00 → TPE 12:25"}
    ],
    budget:{transport:"¥4,600 (JR×4)",meals:"~¥4,000"}
  }
];

function mapUrl(q){return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`}

function render(){
  const tabs=document.getElementById('tabs');
  const content=document.getElementById('content');

  // Tabs
  tabs.innerHTML=DAYS.map(d=>
    `<div class="tab" data-day="${d.day}">Day ${d.day}<br><span style="font-size:10px;font-weight:400">${d.date.slice(0,5)}</span></div>`
  ).join('');

  // Day views
  content.innerHTML=DAYS.map(d=>{
    let html=`<div class="day-view" id="day${d.day}">`;
    // Header
    html+=`<div class="day-header"><div class="date">Day ${d.day} — ${d.date}</div><div class="date" style="font-size:14px;color:var(--text);margin-top:2px">${d.title}</div>`;
    if(d.hotel)html+=`<div class="hotel">${d.hotel}</div>`;
    d.warns.forEach(w=>html+=`<div class="warn">⚠️ ${w}</div>`);
    html+=`</div>`;
    // Timeline
    html+=`<div class="timeline">`;
    d.items.forEach(it=>{
      const cls=it.c?'item bus':'item';
      html+=`<div class="${cls}"><div class="card${it.c?' compact':''}">`;
      html+=`<div class="time">${it.t}</div>`;
      html+=`<div class="activity">${it.a}</div>`;
      if(it.n)html+=`<div class="notes">${it.n.replace(/⚠️/g,'<span class="warn-text">⚠️</span>')}</div>`;
      if(it.m)html+=`<a class="map-link" href="${mapUrl(it.m)}" target="_blank" rel="noopener">📍 Google Maps</a>`;
      html+=`</div></div>`;
    });
    html+=`</div>`;
    // Budget
    if(d.budget){
      html+=`<div class="budget"><h3>💰 費用概算（4人）</h3><table>`;
      html+=`<tr><td>交通</td><td>${d.budget.transport}</td></tr>`;
      html+=`<tr><td>餐費</td><td>${d.budget.meals}</td></tr>`;
      html+=`</table></div>`;
    }
    html+=`</div>`;
    return html;
  }).join('');

  // Tab switching
  let active=1;
  function setDay(n){
    active=n;
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',+t.dataset.day===n));
    document.querySelectorAll('.day-view').forEach(v=>v.classList.toggle('active',v.id===`day${n}`));
    // scroll tab into view
    const at=document.querySelector('.tab.active');
    if(at)at.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
    window.scrollTo({top:0,behavior:'smooth'});
  }
  tabs.addEventListener('click',e=>{
    const tab=e.target.closest('.tab');
    if(tab)setDay(+tab.dataset.day);
  });

  // Swipe support
  let sx=0,sy=0;
  content.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  content.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0&&active<6)setDay(active+1);
      else if(dx>0&&active>1)setDay(active-1);
    }
  },{passive:true});

  // Auto-select today or Day 1
  const today=new Date();
  const dayMap={15:1,16:2,17:3,18:4,19:5,20:6};
  const autoDay=(today.getFullYear()===2026&&today.getMonth()===4)?dayMap[today.getDate()]||1:1;
  setDay(autoDay);
}

render();

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
